<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8B1A1A">
<title>細かい通帳</title>
<style>
/* ============================================================
   細かい通帳 v2 — MUJI App Style
   大財布→小財布 振り分け構造対応版
   ============================================================ */
:root{
  --bg:#FFFFFF;
  --text:#1A1A1A;
  --sub:#595959;
  --border:#D9D9D9;
  --card:#F5F5F0;
  --hover:#F0F0EB;
  --crimson:#8B1A1A;
  --crimson-deep:#6E1414;
  --crimson-pale:#F9F0F0;
  --crimson-text:#8B1A1A;
  --accent:#B5180F;
  --fontJP:"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;
  --fontEN:"Helvetica Neue",Arial,sans-serif;
  --maxw:1080px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--fontJP);background:var(--bg);color:var(--text);font-size:13px;font-weight:400;line-height:1.9;letter-spacing:0.05em;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
b,strong{font-weight:500;}
button{font-family:inherit;letter-spacing:inherit;cursor:pointer;color:inherit;}
input,select,textarea{font-family:inherit;letter-spacing:inherit;}
.muted{color:var(--sub);}

/* ---- App shell ---- */
#app{min-height:100%;}
.hdr{background:var(--crimson);border-bottom:none;position:sticky;top:0;z-index:20;}
.hdr-inner{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:17px;font-weight:500;letter-spacing:0.1em;color:#fff;}
.sync{font-size:11px;font-family:var(--fontEN);min-height:16px;color:rgba(255,255,255,.65);}
.sync.s-synced{color:rgba(255,255,255,.9);}
.sync.s-offline{color:#FFB3AE;}
.main{max-width:var(--maxw);margin:0 auto;padding:0 0 104px;}

/* ---- Tab bar ---- */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--crimson);padding-bottom:env(safe-area-inset-bottom);}
.tabbar-inner{max-width:var(--maxw);margin:0 auto;display:flex;}
.tab{flex:1;background:transparent;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 11px;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:0.04em;transition:color .2s ease;}
.tab svg{display:block;}
.tab.active{color:#fff;}
.tab.active svg{stroke:#fff;}

/* ---- 総残高バナー ---- */
.total-banner{background:var(--crimson);padding:20px 24px 22px;}
.total-label{font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,.65);margin-bottom:2px;}
.total-amt{font-size:28px;font-weight:500;font-family:var(--fontEN);color:#fff;margin-bottom:14px;}
.banner-sub{display:flex;gap:24px;margin-bottom:16px;}
.banner-sub-item{display:flex;flex-direction:column;}
.banner-sub-item span{font-size:10px;letter-spacing:0.08em;color:rgba(255,255,255,.6);margin-bottom:2px;}
.banner-sub-item b{font-size:14px;font-weight:500;font-family:var(--fontEN);color:rgba(255,255,255,.92);}
.record-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rec-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:0;padding:13px 8px;font-size:13px;font-weight:500;letter-spacing:0.06em;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s ease;}
.rec-btn:hover{background:rgba(255,255,255,.25);}
.rec-btn svg{flex:0 0 auto;}

/* ---- 大財布→小財布 振り分けバナー ---- */
.master-banner{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;}
.master-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
.master-name{font-size:12px;color:var(--sub);letter-spacing:0.08em;}
.master-bal{font-size:22px;font-weight:500;font-family:var(--fontEN);color:var(--text);}
.master-bal.over{color:var(--accent);}
.undistrib-row{display:flex;align-items:center;justify-content:space-between;}
.undistrib-label{font-size:11px;color:var(--sub);}

/* ---- Content padding ---- */
.pad{padding:24px 24px 0;}

/* ---- Sections ---- */
.sec{padding:0 24px 32px;}
.sec+.sec{border-top:1px solid var(--border);padding-top:24px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec h2{font-size:14px;font-weight:500;letter-spacing:0.08em;}

/* ---- Buttons ---- */
.btn-primary{background:var(--crimson);color:#fff;border:none;border-radius:0;padding:12px 24px;font-size:13px;transition:opacity .2s ease;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:transparent;color:var(--crimson-text);border:1px solid var(--crimson);border-radius:0;padding:11px 20px;font-size:13px;transition:background .2s ease;}
.btn-secondary:hover{background:var(--crimson-pale);}
.btn-ghost{background:transparent;color:var(--sub);border:none;padding:10px 16px;font-size:13px;}
.btn-ghost:hover{color:var(--text);}
.btn-danger{background:var(--accent);color:#fff;border:none;border-radius:0;padding:12px 24px;font-size:13px;transition:opacity .2s ease;}
.btn-danger:hover{opacity:.88;}
.btn-primary.sm,.btn-secondary.sm{padding:7px 14px;font-size:12px;}
.btn-primary.block{display:block;width:100%;}
.btn-col{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.btn-col .btn-secondary{width:100%;text-align:left;}
.btn-reset{width:100%;text-align:left;background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:0;padding:11px 20px;font-size:13px;transition:background .2s ease;}
.btn-reset:hover{background:var(--crimson-pale);}
.icon-btn{background:transparent;border:none;color:var(--sub);padding:6px;line-height:0;transition:color .2s ease;}
.icon-btn:hover{color:var(--crimson-text);}
.link{background:transparent;border:none;color:var(--crimson-text);font-size:12px;text-decoration:underline;text-underline-offset:3px;padding:8px 0;display:block;margin:0 auto;}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:0;width:34px;height:34px;font-size:17px;font-family:var(--fontEN);color:var(--text);transition:background .2s ease;}
.nav-btn:hover{background:var(--hover);}

/* ---- 小財布カード一覧 ---- */
.sub-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.swcard{background:var(--bg);border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:background .2s ease;}
.swcard:hover{background:var(--hover);}
.swcard-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.swcard-dot{width:9px;height:9px;flex:0 0 auto;}
.swcard-name{font-size:12px;color:var(--sub);letter-spacing:0.06em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.swcard-type{font-size:10px;color:var(--sub);background:var(--card);padding:1px 6px;}
.swcard-amt{font-size:18px;font-weight:500;font-family:var(--fontEN);}
.swcard-budget{margin-top:6px;}
.swcard-bar{height:4px;background:#E6E6E1;margin:4px 0 3px;}
.swcard-bar-fill{height:100%;background:var(--crimson);transition:width .2s ease;}
.swcard-bar-fill.over{background:var(--accent);}
.swcard-budget-label{font-size:10px;color:var(--sub);font-family:var(--fontEN);}

/* ---- Month nav ---- */
.mnav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px;}
.mnav-label{font-size:15px;font-weight:500;letter-spacing:0.08em;min-width:100px;text-align:center;}

/* ---- Summary 3cols ---- */
.summary3{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);}
.s3{padding:14px;text-align:center;border-right:1px solid var(--border);}
.s3:last-child{border-right:none;}
.s3 span{display:block;font-size:11px;color:var(--sub);letter-spacing:0.08em;margin-bottom:3px;}
.s3 b{font-size:16px;font-weight:500;font-family:var(--fontEN);}
.s3.income{background:var(--crimson-pale);}
.s3.income b{color:var(--crimson-text);}
.s3.net-plus b{color:var(--crimson-text);}

/* ---- List rows ---- */
.list{border-top:1px solid var(--border);}
.row{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border);transition:background .2s ease;cursor:pointer;}
.row:hover{background:var(--hover);}
.row-main{flex:1;min-width:0;}
.row-line1{display:flex;align-items:baseline;gap:8px;}
.row-cat{font-size:13px;}
.row-memo{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-line2{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--sub);margin-top:1px;}
.mmdd{font-family:var(--fontEN);}
.dot-sm{display:inline-block;width:7px;height:7px;flex:0 0 auto;}
.row-amt{font-size:15px;font-weight:500;font-family:var(--fontEN);white-space:nowrap;}
.row-amt.income{color:var(--crimson-text);}
.row-del{background:transparent;border:none;color:var(--border);padding:6px;line-height:0;transition:color .2s ease;}
.row:hover .row-del{color:var(--sub);}
.row-del:hover{color:var(--accent)!important;}
.srow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 0;border-bottom:1px solid var(--border);}
.srow:first-child{border-top:1px solid var(--border);}
.srow-main{display:flex;align-items:center;gap:8px;font-size:13px;min-width:0;flex:1;}
.srow-main .muted{font-size:11px;}
.srow-actions{display:flex;gap:2px;flex:0 0 auto;}

/* ---- 振り分けタブ ---- */
.distrib-sec{padding:20px 24px;}
.distrib-sec+.distrib-sec{border-top:1px solid var(--border);}
.distrib-head{font-size:13px;font-weight:500;letter-spacing:0.06em;margin-bottom:12px;color:var(--sub);}
.distrib-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
.distrib-dot{width:9px;height:9px;flex:0 0 auto;}
.distrib-budget{font-size:11px;color:var(--sub);font-family:var(--fontEN);}
.distrib-input{width:96px;border:1px solid var(--border);border-radius:0;padding:8px 10px;font-size:16px;font-family:var(--fontEN);text-align:right;transition:border-color .2s ease;}
.distrib-input:focus{outline:none;border-color:var(--crimson);}
.distrib-row-btn{background:var(--crimson);color:#fff;border:none;border-radius:0;width:40px;height:36px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;transition:opacity .2s ease;}
.distrib-row-btn:hover{opacity:.85;}
.distrib-row-btn svg{display:block;}
.distrib-history-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--sub);}
.distrib-history-row .mmdd{font-family:var(--fontEN);}
.distrib-history-row .damt{font-family:var(--fontEN);font-weight:500;color:var(--text);margin-left:auto;}

/* ---- Calendar ---- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border);}
.cal-wk{padding:7px 0;text-align:center;font-size:11px;color:var(--sub);border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--card);}
.cal-wk.sun{color:var(--crimson-text);}
.cal-cell{min-height:56px;padding:5px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .2s ease;cursor:pointer;}
.cal-cell:hover{background:var(--hover);}
.cal-cell.today{background:var(--crimson-pale);border-left:2px solid var(--crimson);}
.cal-cell.empty-cell{background:var(--card);cursor:default;}
.cal-cell.empty-cell:hover{background:var(--card);}
.cal-day{font-size:11px;font-family:var(--fontEN);color:var(--sub);}
.cal-day.today-num{color:var(--crimson-text);font-weight:500;}
.cal-net{font-size:10px;font-family:var(--fontEN);margin-top:3px;line-height:1.4;word-break:break-all;}
.cal-net.plus{color:var(--crimson-text);}

/* ---- Chart ---- */
.chart-title{font-size:14px;font-weight:500;letter-spacing:0.08em;margin-bottom:14px;}
.chart-wrap{width:100%;}
.chart{width:100%;height:auto;display:block;}
.chart .grid{stroke:var(--border);stroke-width:1;}
.chart .zero{stroke:var(--sub);stroke-width:1;stroke-dasharray:2 2;}
.chart .ylabel{fill:var(--sub);font-size:10px;font-family:var(--fontEN);text-anchor:end;}
.chart .xlabel{fill:var(--sub);font-size:10px;font-family:var(--fontEN);text-anchor:middle;}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;}
.lg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);}
.lg i{width:14px;height:2px;display:inline-block;}

/* ---- Goals ---- */
.goals{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.goal-card{background:var(--card);border:1px solid var(--border);padding:18px;}
.goal-card.goal-archived{opacity:.72;background:var(--bg);}
.goal-card.goal-archived .bar-fill{background:var(--sub);}
.goal-card.goal-archived .goal-name::after{content:" ✓";color:var(--crimson);font-size:12px;}
.goal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.goal-name{font-size:14px;font-weight:500;}
.goal-actions{display:flex;gap:2px;flex:0 0 auto;}
.goal-nums{font-size:17px;font-weight:500;font-family:var(--fontEN);margin:7px 0 9px;}
.goal-nums .muted{font-size:13px;}
.bar{height:5px;background:#E6E6E1;border:none;}
.bar-fill{height:100%;background:var(--crimson);transition:width .2s ease;}
.goal-meta{font-size:11px;color:var(--sub);margin-top:7px;letter-spacing:0.06em;}

/* ---- Modal ---- */
.overlay{position:fixed;inset:0;background:rgba(26,26,26,.4);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0;}
.modal{background:var(--bg);border:1px solid var(--border);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-head{font-size:15px;font-weight:500;letter-spacing:0.08em;padding:16px 22px;background:var(--crimson);color:#fff;}
.modal-body{padding:16px 22px 8px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:8px 22px 22px;}
.confirm-msg{padding:22px 22px 8px;font-size:14px;line-height:1.9;}
.fld{display:block;margin-bottom:14px;}
.fld>span{display:block;font-size:11px;color:var(--sub);letter-spacing:0.08em;margin-bottom:5px;}
.fld input,.fld select{width:100%;border:1px solid var(--border);border-radius:0;padding:9px 11px;font-size:16px;background:var(--bg);color:var(--text);transition:border-color .2s ease;}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--crimson);}
.fld input::placeholder{color:var(--sub);}
.seg{display:flex;border:1px solid var(--border);margin-bottom:14px;}
.seg-btn{flex:1;background:transparent;border:none;padding:9px;font-size:13px;color:var(--sub);transition:background .2s ease,color .2s ease;}
.seg-btn.on{background:var(--crimson);color:#fff;}
.cdots{display:flex;flex-wrap:wrap;gap:8px;}
.cdot{width:26px;height:26px;border:1px solid var(--border);border-radius:0;padding:0;transition:transform .2s ease;}
.cdot.sel{outline:2px solid var(--crimson);outline-offset:2px;}
.radio-group{display:flex;flex-direction:column;gap:6px;}
.radio-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
.radio-row input[type=radio]{accent-color:var(--crimson);width:14px;height:14px;}

/* ---- Auth ---- */
.auth-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{width:100%;max-width:360px;}
.auth-title{font-size:20px;font-weight:500;letter-spacing:0.1em;text-align:center;color:var(--crimson-text);}
.auth-sub{font-size:12px;color:var(--sub);text-align:center;margin:8px 0 26px;}
.auth-err{font-size:12px;color:var(--accent);min-height:18px;margin-bottom:4px;}
.loading-wrap{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;}

/* ---- Tutorial ---- */
.tut-head{font-size:16px;font-weight:500;letter-spacing:0.08em;padding:18px 22px;background:var(--crimson);color:#fff;}
.tut-body{padding:20px 22px 8px;}
.tut-lead{font-size:13px;color:var(--text);line-height:1.9;margin-bottom:20px;}
.tut-step{display:flex;gap:14px;margin-bottom:18px;}
.tut-num{flex:0 0 auto;width:26px;height:26px;border:1px solid var(--crimson);color:var(--crimson-text);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--fontEN);}
.tut-step-body{flex:1;min-width:0;}
.tut-step-title{font-size:13px;font-weight:500;margin-bottom:2px;}
.tut-step-desc{font-size:12px;color:var(--sub);line-height:1.8;}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--text);color:#fff;font-size:13px;letter-spacing:0.06em;padding:12px 24px;z-index:100;opacity:0;transition:opacity .2s ease;pointer-events:none;}
.toast.show{opacity:1;}

/* ---- Misc ---- */
.empty{padding:28px 0;text-align:center;color:var(--sub);font-size:12px;}
.hint{font-size:11px;color:var(--sub);margin-top:10px;letter-spacing:0.06em;}
.note{font-size:12px;color:var(--sub);line-height:1.9;background:var(--card);border:1px solid var(--border);padding:14px;}
.note code{font-family:var(--fontEN);background:#fff;border:1px solid var(--border);padding:1px 5px;font-size:11px;}
.ver{font-size:11px;color:var(--sub);font-family:var(--fontEN);}

@media(max-width:520px){
  .total-amt{font-size:24px;}
  .s3 b{font-size:14px;}
  .modal{max-height:88vh;}
}
@media(min-width:560px){
  .overlay{align-items:center;padding:24px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
/* ============================================================
   細かい通帳 v2 — 大財布→小財布 振り分け構造
   ARCHITECTURE:
   1. CONFIG
   2. State
   3. Utils
   4. LocalStore
   5. Auth (Firebase REST)
   6. Cloud (Realtime DB REST)
   7. Data CRUD
   8. Calc (pure)
   9. ICON / Views / Forms
  10. Events
  11. init
   ============================================================ */

/* ===== 1. CONFIG ===== */
const CONFIG={
  appName:'細かい通帳',
  version:'2.1',
  firebase:{ apiKey:'AIzaSyAOqIfPKC0c0Z1GPH_Gt1fcZU8JvsPX7x0', databaseURL:'https://detailed-passbook-default-rtdb.asia-southeast1.firebasedatabase.app' },
  syncDebounceMs:1500,
};
const WALLET_COLORS=['#1A1A1A','#8B1A1A','#595959','#A6927B','#6B7A8F','#7B8C6B','#8C6B7B','#5C7A6B'];

/* ===== 2. State ===== */
const State={
  /*
    data.masterWallet  : { id, name, initialBalance, color, createdAt }
    data.subWallets    : [{ id, name, color, budgetMode('distrib'|'fixed'),
                            fixedBudget(number, budgetMode==='fixed'のとき),
                            createdAt }]
    data.distributions : [{ id, subWalletId, ym, amount, createdAt }]
                          ← 月ごとに大財布→小財布へ振り分けた記録
    data.records       : [{ id, subWalletId, type('income'|'expense'),
                            amount, categoryId, date, memo, createdAt }]
                          ← 大財布への収入も subWalletId=null で管理
    data.categories    : [{ id, name, type, createdAt }]
    data.goals         : [{ id, name, targetAmount, subWalletId, achievedAt, createdAt }]
  */
  data:{masterWallet:null, subWallets:[], distributions:[], records:[], categories:[], goals:[]},
  ui:{tab:'home', month:ymNow(), authMode:'login'},
  auth:{user:null, idToken:null, refreshToken:null, expiresAt:0, loading:false},
  sync:{enabled:false, status:'local'},
};
let _confirmResolve=null;

/* ===== 3. Utils ===== */
const $=(sel,root)=>(root||document).querySelector(sel);
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function ymNow(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function yen(n){ const v=Math.round(n||0); return (v<0?'-':'')+'¥'+Math.abs(v).toLocaleString('ja-JP'); }
function yenAbs(n){ return '¥'+Math.abs(Math.round(n||0)).toLocaleString('ja-JP'); }
function yenPlain(n){ return '¥'+Math.round(n||0).toLocaleString('ja-JP'); }
function signed(r){ return r.type==='income'?r.amount:-r.amount; }
function daysInMonth(ym){ const a=ym.split('-').map(Number); return new Date(a[0],a[1],0).getDate(); }
function ymLabel(ym){ const a=ym.split('-').map(Number); return a[0]+'年'+a[1]+'月'; }
function shiftMonth(ym,delta){ let a=ym.split('-').map(Number),y=a[0],m=a[1]+delta; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} return y+'-'+String(m).padStart(2,'0'); }
function byId(arr,id){ return arr.find(x=>x.id===id); }
function shortYen(v){ const a=Math.abs(v); if(a>=10000){ return (Math.round(v/1000)/10)+'万'; } return Math.round(v).toLocaleString('ja-JP'); }

const SESSION_KEY='komakai_session_v2';

  load(){ try{ const s=localStorage.getItem(STORAGE_KEY); if(s) State.data=normalize(JSON.parse(s)); }catch(e){} },
};
function normalize(d){
  d=d||{};
  return {
    masterWallet: d.masterWallet||null,
    subWallets: Array.isArray(d.subWallets)?d.subWallets:[],
    distributions: Array.isArray(d.distributions)?d.distributions:[],
    records: Array.isArray(d.records)?d.records:[],
    categories: Array.isArray(d.categories)?d.categories:[],
    goals: Array.isArray(d.goals)?d.goals:[],
  };
}
function migrateFromV1(d){
  // 旧版（wallets配列）からの移行
  if(!d.masterWallet && Array.isArray(d.wallets) && d.wallets.length>0){
    const old=d.wallets;
    d.masterWallet={ id:old[0].id, name:old[0].name, initialBalance:old[0].initialBalance||0, color:WALLET_COLORS[0], createdAt:Date.now() };
    d.subWallets=(old.slice(1)||[]).map(w=>({id:w.id,name:w.name,color:w.color,budgetMode:'distrib',fixedBudget:0,createdAt:w.createdAt||Date.now()}));
    d.distributions=[];
    // 旧recordsのwalletIdをsubWalletIdに移行
    if(Array.isArray(d.records)){
      d.records=d.records.map(r=>({...r, subWalletId:r.walletId||null, walletId:undefined}));
    }
    delete d.wallets;
  }
  return d;
}
function seedIfEmpty(){

}

/* ===== 5. Auth ===== */
const Auth={
  signUp(e,p){ return this._idp('signUp',{email:e,password:p,returnSecureToken:true}); },
  signIn(e,p){ return this._idp('signInWithPassword',{email:e,password:p,returnSecureToken:true}); },
  async _idp(method,body){
    const url='https://identitytoolkit.googleapis.com/v1/accounts:'+method+'?key='+encodeURIComponent(CONFIG.firebase.apiKey);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok) throw new Error((data.error&&data.error.message)||'AUTH_ERROR');
    this._apply(data); return data;
  },
  _apply(data){
    State.auth.user={uid:data.localId,email:data.email};
    State.auth.idToken=data.idToken;
    State.auth.refreshToken=data.refreshToken;
    State.auth.expiresAt=Date.now()+(Number(data.expiresIn||3600)-60)*1000;
    saveSession();
  },
  async ensureToken(){
    if(!State.auth.refreshToken) throw new Error('NO_SESSION');
    if(State.auth.idToken&&Date.now()<State.auth.expiresAt) return State.auth.idToken;
    const url='https://securetoken.googleapis.com/v1/token?key='+encodeURIComponent(CONFIG.firebase.apiKey);
    const body='grant_type=refresh_token&refresh_token='+encodeURIComponent(State.auth.refreshToken);
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
    const data=await res.json();
    if(!res.ok) throw new Error('REFRESH_FAILED');
    State.auth.idToken=data.id_token; State.auth.refreshToken=data.refresh_token;
    State.auth.expiresAt=Date.now()+(Number(data.expires_in||3600)-60)*1000;
    if(!State.auth.user) State.auth.user={};
    if(!State.auth.user.uid) State.auth.user.uid=data.user_id;
    saveSession(); return State.auth.idToken;
  },
  signOut(){ State.auth={user:null,idToken:null,refreshToken:null,expiresAt:0,loading:false}; clearSession(); },
};

/* ===== 6. Cloud ===== */
const Cloud={
  _timer:null,
  _url(token){ return CONFIG.firebase.databaseURL.replace(/\/$/,'')+'/users/'+State.auth.user.uid+'.json?auth='+encodeURIComponent(token); },
  async pull(){
    const token=await Auth.ensureToken();
    const res=await fetch(this._url(token));
    if(!res.ok) throw new Error('PULL_FAILED');
    return await res.json();
  },
  async push(){
    if(!State.sync.enabled||!State.auth.user) return;
    try{
      setSync('syncing');
      const token=await Auth.ensureToken();
      const res=await fetch(this._url(token),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(State.data)});
      if(!res.ok) throw new Error('PUSH_FAILED');
      setSync('synced');
    }catch(e){ setSync('offline'); }
  },
  schedule(){
    if(!State.sync.enabled||!State.auth.idToken) return;
    setSync('syncing'); clearTimeout(this._timer);
    this._timer=setTimeout(()=>this.push(),CONFIG.syncDebounceMs);
  },
};
function setSync(status){ State.sync.status=status; renderSyncBadge(); }

/* ===== 8. Calc (pure) ===== */
const Calc={
  /* 大財布残高 = 初期残高 + 全収入 - 全振り分け */
  masterBalance(){
    const m=State.data.masterWallet; if(!m) return 0;
    let bal=m.initialBalance;
    for(const r of State.data.records){ if(r.subWalletId===null||r.subWalletId===undefined) bal+=signed(r); }
    for(const d of State.data.distributions) bal-=d.amount;
    return bal;
  },
  /* 指定月の大財布収入 */
  masterIncome(ym){
    return State.data.records.filter(r=>(r.subWalletId===null||r.subWalletId===undefined)&&r.type==='income'&&r.date&&r.date.slice(0,7)===ym).reduce((s,r)=>s+r.amount,0);
  },
  /* 指定月の振り分け合計 */
  monthDistributed(ym){
    return State.data.distributions.filter(d=>d.ym===ym).reduce((s,d)=>s+d.amount,0);
  },
  /* 小財布の振り分け済み残高（振り分け累計 - 支出累計） */
  subBalance(subWalletId){
    const distrib=State.data.distributions.filter(d=>d.subWalletId===subWalletId).reduce((s,d)=>s+d.amount,0);
    let spent=0;
    for(const r of State.data.records){ if(r.subWalletId===subWalletId) spent+=r.type==='expense'?r.amount:-r.amount; }
    return distrib - spent;
  },
  /* 指定月の小財布予算 */
  subBudget(sw, ym){
    if(sw.budgetMode==='fixed') return sw.fixedBudget||0;
    const d=State.data.distributions.find(x=>x.subWalletId===sw.id&&x.ym===ym);
    return d?d.amount:0;
  },
  /* 指定月の小財布消費額 */
  subSpent(subWalletId, ym){
    return State.data.records.filter(r=>r.subWalletId===subWalletId&&r.type==='expense'&&r.date&&r.date.slice(0,7)===ym).reduce((s,r)=>s+r.amount,0);
  },
  /* 全体総残高 */
  totalBalance(){
    return this.masterBalance()+State.data.subWallets.reduce((s,w)=>s+this.subBalance(w.id),0);
  },
  /* 月の全記録 */
  monthRecords(ym){ return State.data.records.filter(r=>r.date&&r.date.slice(0,7)===ym); },
  monthSummary(ym){
    let inc=0,exp=0;
    for(const r of this.monthRecords(ym)){ if(r.type==='income') inc+=r.amount; else exp+=r.amount; }
    return {income:inc,expense:exp,net:inc-exp};
  },
  /* 折れ線グラフ用 小財布の残高推移 */
  seriesForMonth(subWalletId, ym){
    const sw=byId(State.data.subWallets,subWalletId); if(!sw) return [];
    const dim=daysInMonth(ym);
    // ym以前の振り分け合計
    let running=State.data.distributions.filter(d=>d.subWalletId===subWalletId&&d.ym<ym).reduce((s,d)=>s+d.amount,0);
    // ym以前の支出
    running-=State.data.records.filter(r=>r.subWalletId===subWalletId&&r.date&&r.date.slice(0,7)<ym).reduce((s,r)=>s+(r.type==='expense'?r.amount:-r.amount),0);
    // 当月分の振り分け（月初に一括で加算）
    const monthDistrib=State.data.distributions.filter(d=>d.subWalletId===subWalletId&&d.ym===ym).reduce((s,d)=>s+d.amount,0);
    running+=monthDistrib;
    const byDay={};
    for(const r of State.data.records){
      if(r.subWalletId!==subWalletId||!r.date||r.date.slice(0,7)!==ym) continue;
      const day=Number(r.date.slice(8,10));
      byDay[day]=(byDay[day]||0)+(r.type==='expense'?-r.amount:r.amount);
    }
    const out=[];
    for(let d=1;d<=dim;d++){ running+=(byDay[d]||0); out.push(running); }
    return out;
  },
  goalProgress(g){
    if(g.subWalletId){
      const cur=this.subBalance(g.subWalletId);
      return {current:cur, pct:g.targetAmount>0?Math.max(0,Math.min(100,cur/g.targetAmount*100)):0};
    }
    return {current:0,pct:0};
  },
};

/* ---- グラフ（カレンダータブ内で使用） ---- */
function buildChart(ym){
  const sws=State.data.subWallets;
  if(sws.length===0) return emptyInline('小財布がありません。');
  const dim=daysInMonth(ym);
  const seriesList=sws.map(sw=>({sw,data:Calc.seriesForMonth(sw.id,ym)}));
  let mn=Infinity,mx=-Infinity;
  seriesList.forEach(s=>s.data.forEach(v=>{ if(v<mn)mn=v; if(v>mx)mx=v; }));
  if(!isFinite(mn)){mn=0;mx=0;}
  if(mn===mx){mn-=1;mx+=1;}
  const pad=(mx-mn)*0.12||1; mn-=pad; mx+=pad;
  const W=720,H=280,L=64,R=16,T=14,B=34;
  const x=d=>L+(W-L-R)*((d-1)/Math.max(1,dim-1));
  const y=v=>T+(H-T-B)*(1-(v-mn)/(mx-mn));
  let grid='';
  for(let i=0;i<=4;i++){
    const val=mn+(mx-mn)*i/4,yy=y(val);
    grid+='<line x1="'+L+'" y1="'+yy.toFixed(1)+'" x2="'+(W-R)+'" y2="'+yy.toFixed(1)+'" class="grid"/>';
    grid+='<text x="'+(L-8)+'" y="'+(yy+3).toFixed(1)+'" class="ylabel">'+shortYen(val)+'</text>';
  }
  let zero='';
  if(mn<0&&mx>0){ const yy=y(0); zero='<line x1="'+L+'" y1="'+yy.toFixed(1)+'" x2="'+(W-R)+'" y2="'+yy.toFixed(1)+'" class="zero"/>'; }
  let xlabels='';
  const tick=dim>20?5:(dim>10?2:1);
  for(let d=1;d<=dim;d+=tick) xlabels+='<text x="'+x(d).toFixed(1)+'" y="'+(H-B+16)+'" class="xlabel">'+d+'</text>';
  let lines='';
  seriesList.forEach(s=>{
    const pts=s.data.map((v,i)=>x(i+1).toFixed(1)+','+y(v).toFixed(1)).join(' ');
    lines+='<polyline points="'+pts+'" fill="none" stroke="'+s.sw.color+'" stroke-width="1.5"/>';
  });
  const svg='<svg viewBox="0 0 '+W+' '+H+'" class="chart" preserveAspectRatio="xMidYMid meet">'+grid+zero+lines+xlabels+'</svg>';
  const legend='<div class="legend">'+seriesList.map(s=>'<span class="lg"><i style="background:'+s.sw.color+'"></i>'+esc(s.sw.name)+'</span>').join('')+'</div>';
  return svg+legend;
}

  if(!name){ alert('名前を入力してください'); return; }
  closeModal();
  Data.updateMaster({name,initialBalance:Number($('#m-init').value)||0,color:$('#w-color').value});
}

/* 小財布フォーム */
function subWalletForm(id){
  const sw=id?byId(State.data.subWallets,id):null;
  const cur=sw?sw.color:WALLET_COLORS[State.data.subWallets.length%WALLET_COLORS.length];
  const mode=sw?sw.budgetMode:'distrib';
  const cdots=WALLET_COLORS.map(c=>'<button class="cdot'+(cur===c?' sel':'')+'" data-action="pick-color" data-color="'+c+'" style="background:'+c+'"></button>').join('');
  openModal(''
    +'<div class="modal-head">'+(id?'小財布を編集':'小財布を追加')+'</div>'
    +'<div class="modal-body">'
      +'<label class="fld"><span>名前</span><input type="text" id="sw-name" value="'+(sw?esc(sw.name):'')+'" placeholder="例：食費 / PayPay"></label>'
      +'<div class="fld"><span>色</span><div class="cdots">'+cdots+'</div><input type="hidden" id="w-color" value="'+cur+'"></div>'
      +'<div class="fld"><span>予算モード</span>'
        +'<div class="radio-group">'
          +'<label class="radio-row"><input type="radio" name="budget-mode" value="distrib"'+(mode==='distrib'?' checked':'')+' id="bm-distrib">毎月の振り分け額を予算として使う</label>'
          +'<label class="radio-row"><input type="radio" name="budget-mode" value="fixed"'+(mode==='fixed'?' checked':'')+' id="bm-fixed">固定予算を設定する</label>'
        +'</div>'
      +'</div>'
      +'<label class="fld" id="fixed-budget-fld" style="'+(mode==='fixed'?'':'display:none;')+'">'
        +'<span>固定予算額</span><input type="number" inputmode="numeric" id="sw-budget" value="'+(sw&&sw.budgetMode==='fixed'?sw.fixedBudget:'')+'" placeholder="30000">'
      +'</label>'
    +'</div>'
    +'<div class="modal-actions"><button class="btn-ghost" data-action="modal-cancel">キャンセル</button><button class="btn-primary" data-action="save-sub" data-id="'+(id||'')+'">保存</button></div>');
  // ラジオ切り替え
  document.querySelectorAll('[name="budget-mode"]').forEach(r=>{
    r.addEventListener('change',()=>{
      const fld=$('#fixed-budget-fld');
      if(fld) fld.style.display=r.value==='fixed'?'':'none';
    });
  });
}
function saveSubWallet(id){
  const name=$('#sw-name').value.trim();
  if(!name){ alert('名前を入力してください'); return; }
  const checked=document.querySelector('[name="budget-mode"]:checked');
  const mode=(checked&&checked.value)||'distrib';
  const budgetEl=$('#sw-budget');
  const payload={name,color:$('#w-color').value,budgetMode:mode,fixedBudget:Number(budgetEl&&budgetEl.value)||0};
  closeModal();
  if(id) Data.updateSubWallet(id,payload); else Data.addSubWallet(payload);
}

/* カテゴリフォーム */
function categoryForm(id){
  const c=id?byId(State.data.categories,id):null;
  const type=c?c.type:'expense';
  openModal(''
    +'<div class="modal-head">'+(id?'カテゴリを編集':'カテゴリを追加')+'</div>'
    +'<div class="modal-body">'
      +'<div class="seg"><button class="seg-btn'+(type==='expense'?' on':'')+'" data-action="cat-type" data-type="expense">支出</button><button class="seg-btn'+(type==='income'?' on':'')+'" data-action="cat-type" data-type="income">収入</button></div>'
      +'<input type="hidden" id="c-type" value="'+type+'">'
      +'<label class="fld"><span>名前</span><input type="text" id="c-name" value="'+(c?esc(c.name):'')+'" placeholder="例：食費"></label>'
    +'</div>'
    +'<div class="modal-actions"><button class="btn-ghost" data-action="modal-cancel">キャンセル</button><button class="btn-primary" data-action="save-category" data-id="'+(id||'')+'">保存</button></div>');
}
function saveCategory(id){
  const name=$('#c-name').value.trim();
  if(!name){ alert('名前を入力してください'); return; }
  closeModal();
  if(id) Data.updateCategory(id,{name,type:$('#c-type').value}); else Data.addCategory({name,type:$('#c-type').value});
}

/* 目標フォーム */
function goalForm(id){
  const g=id?byId(State.data.goals,id):null;
  const swOpts='<option value="">（連動しない）</option>'+State.data.subWallets.map(sw=>'<option value="'+sw.id+'"'+(g&&g.subWalletId===sw.id?' selected':'')+'>'+esc(sw.name)+'</option>').join('');
  openModal(''
    +'<div class="modal-head">'+(id?'目標を編集':'目標を追加')+'</div>'
    +'<div class="modal-body">'
      +'<label class="fld"><span>目標名</span><input type="text" id="g-name" value="'+(g?esc(g.name):'')+'" placeholder="例：旅行貯金"></label>'
      +'<label class="fld"><span>目標金額</span><input type="number" inputmode="numeric" id="g-target" value="'+(g?g.targetAmount:'')+'" placeholder="100000"></label>'
      +'<label class="fld"><span>連動する小財布</span><select id="g-sub">'+swOpts+'</select></label>'
      +'<p class="hint">小財布を選ぶと、その残高が達成額として自動計算されます。</p>'
    +'</div>'
    +'<div class="modal-actions"><button class="btn-ghost" data-action="modal-cancel">キャンセル</button><button class="btn-primary" data-action="save-goal" data-id="'+(id||'')+'">保存</button></div>');
}
function saveGoal(id){
  const name=$('#g-name').value.trim();
  if(!name){ alert('目標名を入力してください'); return; }
  const payload={name,targetAmount:Number($('#g-target').value)||0,subWalletId:$('#g-sub').value||null};
  closeModal();
  if(id) Data.updateGoal(id,payload); else Data.addGoal(payload);
}

/* セグメント切り替え */
function setRecType(type){
  const hid=$('#rec-type'); if(!hid) return; hid.value=type;
  document.querySelectorAll('[data-action="rec-type"]').forEach(b=>b.classList.toggle('on',b.getAttribute('data-type')===type));
  const cat=$('#rec-cat'); if(cat) cat.innerHTML=categoryOptions(type,null);
}
function setSegType(btn){
  const type=btn.getAttribute('data-type');
  const hid=$('#c-type'); if(hid) hid.value=type;
  document.querySelectorAll('[data-action="cat-type"]').forEach(b=>b.classList.toggle('on',b===btn));
}
function setColor(btn){
  const c=btn.getAttribute('data-color'); const hid=$('#w-color'); if(hid) hid.value=c;
  document.querySelectorAll('[data-action="pick-color"]').forEach(b=>b.classList.toggle('sel',b===btn));
}

/* 振り分け一括保存 */
/* 1つの小財布へ振り分け（行ごとのボタン） */
function setOneDistribution(subWalletId){
  const ym=State.ui.month;
  const input=$('#dist-'+subWalletId);
  if(!input){ return; }
  const amt=Number(input.value)||0;
  const existing=State.data.distributions.find(function(d){ return d.subWalletId===subWalletId&&d.ym===ym; });
  if(existing){ existing.amount=amt; }
  else{ State.data.distributions.push({id:uid(),subWalletId:subWalletId,ym:ym,amount:amt,createdAt:Date.now()}); }
  const sw=byId(State.data.subWallets,subWalletId);
  commit();
  toast((sw?sw.name:'小財布')+' に '+yenAbs(amt)+' 振り分けました');
}

/* Export / Import */
function exportData(){
  const blob=new Blob([JSON.stringify(State.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='komakai-backup-'+todayStr().replace(/-/g,'')+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function resetData(){
  confirmDialog('すべてのデータ（小財布・記録・振り分け・目標・カテゴリ）を削除して初期状態に戻します。この操作は取り消せません。よろしいですか？').then(function(ok){
    if(!ok) return;
    // データを空に
    State.data={masterWallet:null, subWallets:[], distributions:[], records:[], categories:[], goals:[]};
    seedIfEmpty();           // 大財布の器だけ再生成
    State.ui.tab='home';
    try{ localStorage.removeItem(TUTORIAL_KEY); }catch(e){}  // チュートリアルも再表示されるように
    commit();                // 保存＋再描画（クラウド有効時は同期もされる）
    toast('データをリセットしました');
    maybeShowTutorial();
  });
}

/* Auth flow */
async function doAuth(isSignup){
  const email=$('#auth-email').value.trim(), password=$('#auth-pass').value;
  const errEl=$('#auth-err');
  if(!email||!password){ errEl.textContent='メールとパスワードを入力してください'; return; }
  errEl.textContent='';
  try{
    if(isSignup) await Auth.signUp(email,password); else await Auth.signIn(email,password);
    await afterLogin();
  }catch(err){ if($('#auth-err')) $('#auth-err').textContent=authErrMsg(err.message); }
}
function authErrMsg(code){
  const map={EMAIL_EXISTS:'このメールは既に登録されています',INVALID_LOGIN_CREDENTIALS:'メールまたはパスワードが違います',INVALID_PASSWORD:'パスワードが違います',EMAIL_NOT_FOUND:'アカウントが見つかりません',WEAK_PASSWORD:'パスワードは6文字以上にしてください',MISSING_PASSWORD:'パスワードを入力してください',INVALID_EMAIL:'メールアドレスの形式が正しくありません'};
  for(const k in map){ if(code&&code.indexOf(k)>=0) return map[k]; }
  return 'エラーが発生しました（'+esc(code||'')+'）';
}
async function afterLogin(){
  let isNewUser=false;
  try{
    setSync('syncing');
    const remote=await Cloud.pull();
    const hasRemote=remote&&(remote.masterWallet||Array.isArray(remote.subWallets)||Array.isArray(remote.records));
    if(hasRemote){ State.data=normalize(remote); seedIfEmpty(); LocalStore.save(); setSync('synced'); }
    else{ isNewUser=true; seedIfEmpty(); await Cloud.push(); }
  }catch(e){ setSync('offline'); }
  render();
  if(isNewUser) maybeShowTutorial();
}
async function silentLogin(){
  State.auth.loading=true; render();
  try{ await Auth.ensureToken(); await afterLogin(); }
  catch(e){ Auth.signOut(); }
  finally{ State.auth.loading=false; render(); }
}

/* render */
function render(){
  const app=$('#app');
  if(State.sync.enabled){
    if(State.auth.idToken&&State.auth.user){ app.innerHTML=Shell(); renderSyncBadge(); return; }
    if(State.auth.loading){ app.innerHTML=LoadingView(); return; }
    app.innerHTML=LoginView(); return;
  }
  app.innerHTML=Shell(); renderSyncBadge();
}
function renderSyncBadge(){
  const el=$('#sync-badge'); if(!el) return;
  if(!State.sync.enabled){ el.textContent=''; el.className='sync'; return; }
  const map={syncing:'同期中…',synced:'● 同期済',offline:'● オフライン',local:''};
  el.textContent=map[State.sync.status]||''; el.className='sync s-'+State.sync.status;
}

/* ===== 10. Events ===== */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]'); if(!t) return;
  const action=t.getAttribute('data-action');
  const id=t.getAttribute('data-id')||'';

  if(action.indexOf('tab:')===0){ State.ui.tab=action.slice(4); render(); return; }
  switch(action){
    case 'month-prev': State.ui.month=shiftMonth(State.ui.month,-1); render(); break;
    case 'month-next': State.ui.month=shiftMonth(State.ui.month,1); render(); break;

    /* 収支記録 */
    case 'add-record-income':  recordForm(null,'income'); break;
    case 'add-record-expense': recordForm(null,'expense'); break;
    case 'edit-record':        recordForm(id); break;
    case 'del-record':         confirmDialog('この記録を削除しますか？').then(ok=>{ if(ok) Data.deleteRecord(id); }); break;
    case 'day-add':{ recordForm(null,'expense'); const d=t.getAttribute('data-date'); if(d){ const el=$('#rec-date'); if(el) el.value=d; } break; }
    case 'open-sub':{ recordForm(null,'expense',id); break; }
    case 'save-record':        saveRecord(id); break;

    /* 大財布 */
    case 'edit-master': masterForm(); break;
    case 'save-master': saveMaster(); break;

    /* 小財布 */
    case 'add-sub':   subWalletForm(); break;
    case 'edit-sub':  subWalletForm(id); break;
    case 'del-sub':   confirmDialog('この小財布を削除すると、関連する記録・振り分けもすべて削除されます。よろしいですか？').then(ok=>{ if(ok) Data.deleteSubWallet(id); }); break;
    case 'save-sub':  saveSubWallet(id); break;

    /* 振り分け */
    case 'set-distribution': setOneDistribution(id); break;

    /* カテゴリ */
    case 'add-category':    categoryForm(); break;
    case 'edit-category':   categoryForm(id); break;
    case 'del-category':    confirmDialog('このカテゴリを削除しますか？').then(ok=>{ if(ok) Data.deleteCategory(id); }); break;
    case 'save-category':   saveCategory(id); break;

    /* 目標 */
    case 'add-goal':      goalForm(); break;
    case 'edit-goal':     goalForm(id); break;
    case 'del-goal':      confirmDialog('この目標を削除しますか？').then(ok=>{ if(ok) Data.deleteGoal(id); }); break;
    case 'save-goal':     saveGoal(id); break;
    case 'achieve-goal':  confirmDialog('「'+((byId(State.data.goals,id)||{}).name||'この目標')+'」を達成済みにしますか？').then(ok=>{ if(ok) Data.achieveGoal(id); }); break;
    case 'unarchive-goal':Data.unarchiveGoal(id); break;

    /* フォーム内UI */
    case 'rec-type':  setRecType(t.getAttribute('data-type')); break;
    case 'cat-type':  setSegType(t); break;
    case 'pick-color':setColor(t); break;

    /* モーダル */
    case 'modal-cancel':   closeModal(); break;
    case 'modal-backdrop': if(e.target.classList.contains('overlay')) closeModal(); break;
    case 'confirm-ok':     closeModal(); if(_confirmResolve){ _confirmResolve(true); _confirmResolve=null; } break;
    case 'confirm-cancel': closeModal(); if(_confirmResolve){ _confirmResolve(false); _confirmResolve=null; } break;

    /* 認証 */
    case 'auth-login':   doAuth(false); break;
    case 'auth-signup':  doAuth(true); break;
    case 'auth-toggle':  State.ui.authMode=(State.ui.authMode==='signup'?'login':'signup'); render(); break;
    case 'auth-logout':  Auth.signOut(); State.sync.status='local'; render(); break;

    /* データ */
    case 'export-data': exportData(); break;
    case 'import-data': { const f=$('#import-file'); if(f) f.click(); break; }
    case 'tut-close': closeModal(); try{ localStorage.setItem(TUTORIAL_KEY,'1'); }catch(e){} break;
    case 'show-tutorial': showTutorial(); break;
    case 'reset-data': resetData(); break;
  }
});
document.addEventListener('change',e=>{
  if(e.target&&e.target.id==='import-file'){
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const obj=JSON.parse(reader.result);
        confirmDialog('現在のデータを上書きします。よろしいですか？').then(ok=>{ if(ok){ State.data=normalize(migrateFromV1(obj)); commit(); } });
      }catch(err){ alert('読み込みに失敗しました'); }
      e.target.value='';
    };
    reader.readAsText(f);
  }
});
window.addEventListener('online',()=>{ if(State.sync.enabled&&State.auth.idToken) Cloud.push(); });
window.addEventListener('offline',()=>{ if(State.sync.enabled) setSync('offline'); });

/* ===== 11. init ===== */
function maybeShowTutorial(){
  let done=false;
  try{ done=localStorage.getItem(TUTORIAL_KEY)==='1'; }catch(e){}
  if(!done) showTutorial();
}
function init(){
  State.sync.enabled=!!(CONFIG.firebase.apiKey&&CONFIG.firebase.databaseURL);
  State.ui.authMode='login';
  LocalStore.load();
  // 旧v1データがあれば移行
  const raw=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
  if(raw.wallets&&!raw.masterWallet){ State.data=normalize(migrateFromV1(raw)); LocalStore.save(); }
  if(State.sync.enabled){
    loadSession();
    if(State.auth.refreshToken){ silentLogin(); return; }
    render(); return;
  }
  seedIfEmpty(); LocalStore.save(); render();
  maybeShowTutorial();
}
init();
</script>
